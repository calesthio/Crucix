<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIX Diagnostics</title>
<link rel="stylesheet" href="/ops-shell.css">
</head>
<body>
<div id="app"></div>
<script src="/ops-shell.js"></script>
<script>
{
const { esc, row, renderCard, mountOpsShell, createRuntimeActionMonitor } = window.CRUCIX_OPS_SHELL;
const shell = mountOpsShell({
  activeSurface: 'diagnostics',
  kicker: 'Crucix diagnostics',
  title: 'Runtime and review diagnostics',
  subtitle: 'This surface is for runtime review, clustering diagnostics, and debug-adjacent inspection. It is intentionally separate from the normal operator view and from local-write administration.',
  loadingText: 'Loading diagnostics…',
  contentClass: 'grid',
});
function tags(items){return `<div class="tags">${items.map(item => `<span class="tag">${esc(item)}</span>`).join('')}</div>`;}
function restartAuditRows(items){return (items || []).map(item => `<div><strong>${esc(item.action || 'runtime-action')} • ${esc(item.phase || 'unknown')}</strong><div class="mini">${esc(item.recordedAt || item.completedAt || item.queuedAt || 'n/a')} • ${esc(item.status || 'unknown')} • mode ${esc(item.replacementMode || 'n/a')}</div><div class="mini">port ${esc(String(item.port || 'n/a'))} • live PID ${esc(String(item.livePid || 'n/a'))} • started PID ${esc(String(item.startedPid || 'n/a'))} • rotation ${esc(item.rotationProved === true ? 'proved' : item.rotationProved === false ? 'not proved' : 'n/a')}</div>${item.error ? `<div class="mini">${esc(item.error)}</div>` : ''}</div>`).join('') || '<div class="mini">No retained runtime action audit entries yet.</div>';}
function criticalEventCandidateRows(items){return (items || []).slice(0,6).map(item => `<div><strong>${esc(item.label || item.candidateId || 'candidate')}</strong><div class="mini">${esc(item.classId || 'unknown')} • ${esc(item.status || 'unknown')} • ${esc(item.confidenceLabel || 'unknown')}${item.region ? ` • ${esc(item.region)}` : ''}</div><div class="mini">score ${esc(String(item.classification?.winnerScore ?? 0))} vs runner-up ${esc(String(item.classification?.secondScore ?? 0))}${item.classification?.ambiguous ? ' • ambiguous' : ''}${item.classification?.weakMatch ? ' • weak-match' : ''}</div><div class="mini">${(item.classification?.topBasis || []).map(reason => esc(reason)).join(' • ') || 'No retained classification basis.'}</div></div>`).join('') || '<div class="mini">No critical-event candidates are retained right now.</div>';}
const restartAuditMonitor = createRuntimeActionMonitor(shell, { onRefresh: (message) => boot({ preserveStatus: message }) });
async function fetchJson(url){ const res = await fetch(url); if(!res.ok) throw new Error(`HTTP ${res.status}`); return res.json(); }
async function boot(options = {}){
  try {
    const [settings, reviewStats, analysisReview, reviewWorkflow] = await Promise.all([
      fetchJson('/api/settings/admin'),
      fetchJson('/api/brief/news/review/stats'),
      fetchJson('/api/analysis/review'),
      fetchJson('/api/brief/news/review'),
    ]);
    const criticalEventQueue = settings.alerts?.criticalEvents?.queue || {};
    const latestRestartAudit = settings.runtimeControl?.restartAudit?.recentEntries?.[0] || null;
    const preserveStatus = options?.preserveStatus || null;
    shell.status.textContent = preserveStatus || `Loaded diagnostics at ${new Date(settings.generatedAt).toLocaleString()}`;
    shell.content.hidden = false;
    shell.content.innerHTML = [
      renderCard('Surface boundaries', 'Separated information architecture', [row('Operator surface', esc(settings.access?.operatorSurface || '/settings')), row('Diagnostics surface', esc(settings.access?.diagnosticsSurface || '/diagnostics')), row('Admin surface', esc('/admin/settings')), row('Debug exposure', esc(settings.admin?.boundaries?.debugExposure || 'unknown'))].join('')),
      renderCard('Review pressure', 'Queue and ack posture', [row('Active dismissals', esc(String(reviewStats?.summary?.active ?? 0))), row('Repeat acknowledgements', esc(String(reviewStats?.summary?.repeatAckCount ?? 0))), row('Tracked failure regions', esc(String(reviewStats?.stats?.trackedRegionCount ?? 0))), row('Chronic failures', esc(String(reviewStats?.stats?.chronicFailureCount ?? 0)))].join('')),
      renderCard('Analysis review', 'Published reasoning diagnostics', [row('Status', esc(analysisReview?.analysis?.status || 'unknown')), row('Confidence', esc(analysisReview?.analysis?.confidenceLabel || 'unknown')), row('Refinement', esc(analysisReview?.analysis?.refinementState || 'unknown')), row('Review endpoint', '<a href="/api/analysis/review" target="_blank" rel="noreferrer">/api/analysis/review</a>')].join('')),
      renderCard('Workflow controls', 'Direct review actions with audit trail', `<div class="list">${(reviewWorkflow?.workflow?.lowConfidenceSources || []).slice(0, 3).map(item => `<div><strong>${esc(item.name)}</strong><div class="mini">trust ${esc(item.trustOutcome || 'unknown')} • attention ${esc(String(item.attentionScore || 0))}</div><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">${(item.actions || []).map(action => `<button data-review-action="${esc(action.id)}" data-source="${esc(action.sourceId || '')}">${esc(action.label)}</button>`).join('')}</div></div>`).join('') || '<div>No low-confidence source workflow recommendations right now.</div>'}${(reviewWorkflow?.workflow?.promoteCandidates || []).slice(0, 2).map(item => `<div><strong>${esc(item.name)}</strong><div class="mini">${esc(item.promotionReadiness || 'unknown')}</div><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap"><button data-review-action="promote-shadow" data-candidate="${esc(item.candidateId || '')}">Promote to approved</button></div></div>`).join('')}</div>`),
      renderCard('Weak cluster repair helpers', 'Why weak, and which bounded action fits', `<div class="list">${(reviewWorkflow?.workflow?.clusterRepair?.weakClusters || []).slice(0, 4).map(item => `<div><strong>${esc(item.headline || item.clusterId || 'cluster')}</strong><div class="mini">${esc(item.region || 'Unknown')} • quality ${esc(item.quality || 'unknown')} • stories ${esc(String(item.storyCount || 0))} • sources ${esc(String(item.sourceCount || 0))}</div><div class="mini" style="margin-top:6px">${(item.weaknessReasons || []).map(reason => esc(reason)).join(' • ') || 'No explicit weakness reasons captured.'}</div><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">${(item.actions || []).map(action => `<button data-review-action="${esc(action.id)}" data-cluster="${esc(action.clusterId || item.clusterId || '')}" data-target-cluster="${esc(action.targetClusterId || '')}">${esc(action.label)}</button>`).join('') || '<span class="mini">No bounded repair actions available.</span>'}</div></div>`).join('') || '<div>No weak cluster repair helpers are available right now.</div>'}</div>`),
      renderCard('Noise suppression', 'Current suppression candidates, decay, bounded-history telemetry, and sustained-pressure cues', `<div class="list"><div><strong>Operator cue</strong><div class="mini">${esc(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.active ? `${String(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.severity || 'warning').toUpperCase()} • ${reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.summary || 'Noise-suppression pressure is elevated.'}` : 'No sustained noise-suppression pressure alert is active right now.')}</div><div class="mini">Growth streak ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.metrics?.consecutiveGrowthSweeps || 0))} • prune-active streak ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.metrics?.consecutivePruneSweeps || 0))} • retained Δ ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.metrics?.latestRetainedDelta || 0))}</div><div class="mini">Operator status ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.operatorDisposition?.status || 'unattended'))}${reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.operatorDisposition?.snoozedUntil ? ` • snoozed until ${esc(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.operatorDisposition?.snoozedUntil)}` : ''}${reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.operatorDisposition?.acknowledgedAt ? ` • acknowledged ${esc(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.operatorDisposition?.acknowledgedAt)}` : ''}</div></div><div><strong>History telemetry</strong><div class="mini">Aged-out suggestion weight ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.decayTelemetry?.agedOutSuggestionCount || 0))} • retained entries ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.pruneTelemetry?.summary?.retainedEntries || 0))} / ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.pruneTelemetry?.summary?.totalEntries || 0))} • pruning ${esc(reviewWorkflow?.workflow?.noiseSuppression?.history?.pruneTelemetry?.pruningActive ? 'active this sweep' : 'idle this sweep')}</div><div class="mini">Expired removed ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.pruneTelemetry?.summary?.expiredEntriesRemoved || 0))} • overflow removed ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.pruneTelemetry?.summary?.overflowEntriesRemoved || 0))} • last pruned ${esc(reviewWorkflow?.workflow?.noiseSuppression?.history?.pruneTelemetry?.lastPrunedAt || 'n/a')}</div></div><div><strong>Trend</strong><div class="mini">Recent sweeps show whether pruning or aged-out activity is a one-off blip or sustained pressure.</div></div>${(reviewWorkflow?.workflow?.noiseSuppression?.trend?.snapshots || []).slice(0, 5).map(item => `<div><strong>${esc(new Date(item.timestamp).toLocaleString())}</strong><div class="mini">retained ${esc(String(item.summary?.retainedEntries || 0))}/${esc(String(item.summary?.totalEntries || 0))} • aged out ${esc(String(item.summary?.agedOutSuggestionCount || 0))} • prune ${esc(item.summary?.pruningActive ? 'active' : 'idle')}</div><div class="mini">expired ${esc(String(item.summary?.expiredEntriesRemoved || 0))} • overflow ${esc(String(item.summary?.overflowEntriesRemoved || 0))} • duplicate candidates ${esc(String(item.candidateCounts?.duplicateBursts || 0))} • low-value candidates ${esc(String(item.candidateCounts?.repetitiveLowValueEvents || 0))}</div></div>`).join('') || '<div class="mini">Trend snapshots will appear after new-format sweeps are retained.</div>'}${(reviewWorkflow?.workflow?.noiseSuppression?.trend?.deltaViews || []).slice(0, 3).map(item => `<div><strong>Delta vs previous sweep</strong><div class="mini">${esc(new Date(item.currentTimestamp).toLocaleString())} vs ${esc(new Date(item.previousTimestamp).toLocaleString())}</div><div class="mini">retained Δ ${esc(String(item.summaryDelta?.retainedEntries || 0))} • aged-out Δ ${esc(String(item.summaryDelta?.agedOutSuggestionCount || 0))} • expired-prune Δ ${esc(String(item.summaryDelta?.expiredEntriesRemoved || 0))} • overflow-prune Δ ${esc(String(item.summaryDelta?.overflowEntriesRemoved || 0))}</div></div>`).join('')}<div><strong>Recent alert audit</strong><div class="mini">${(reviewWorkflow?.workflow?.noiseSuppression?.pressureAlert?.operatorDisposition?.recentAudit || []).map(item => `${esc(item.recordedAt || '')} ${esc(item.action || '')}${item.snoozeHours ? ` (${esc(String(item.snoozeHours))}h)` : ''}`).join(' • ') || 'No recent operator alert actions.'}</div></div><div><strong>Duplicate bursts</strong><div class="mini">${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.summary?.duplicateBurstCandidateCount || 0))} current candidate groups • retained history ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.decayTelemetry?.bucketCounts?.duplicateBursts || 0))} • aged out ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.decayTelemetry?.agedOutByBucket?.duplicateBursts || 0))}</div></div>${(reviewWorkflow?.workflow?.noiseSuppression?.duplicateBursts || []).slice(0, 3).map(item => `<div><strong>${esc(item.headline || item.id)}</strong><div class="mini">${esc(item.region || 'Unknown')} • similarity ${esc(String(item.similarity || 0))} • clusters ${(item.clusterIds || []).map(id => esc(id)).join(', ')}</div><div class="mini">History ${esc(String(item.historyHitCount || 0))} • decayed ${esc(String(item.decayedHistoryHitCount || 0))} • last seen ${esc(item.lastSeenAt || 'n/a')}</div></div>`).join('') || '<div class="mini">No duplicate-burst candidates right now.</div>'}<div><strong>Repetitive low-value events</strong><div class="mini">${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.summary?.repetitiveLowValueCandidateCount || 0))} current candidates • retained history ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.decayTelemetry?.bucketCounts?.repetitiveLowValueEvents || 0))} • aged out ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.decayTelemetry?.agedOutByBucket?.repetitiveLowValueEvents || 0))}</div></div>${(reviewWorkflow?.workflow?.noiseSuppression?.repetitiveLowValueEvents || []).slice(0, 3).map(item => `<div><strong>${esc(item.headline || item.clusterId)}</strong><div class="mini">${esc(item.region || 'Unknown')} • source ${esc(item.sourceName || item.sourceId || 'unknown')}</div><div class="mini">History ${esc(String(item.historyHitCount || 0))} • decayed ${esc(String(item.decayedHistoryHitCount || 0))} • last seen ${esc(item.lastSeenAt || 'n/a')}</div></div>`).join('') || '<div class="mini">No repetitive low-value candidates right now.</div>'}<div><strong>Source rules</strong><div class="mini">${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.summary?.activeSourceRuleCount || 0))} active • ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.summary?.suggestedSourceRuleCount || 0))} suggested • retained history ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.decayTelemetry?.bucketCounts?.sourceRuleHits || 0))} • aged out ${esc(String(reviewWorkflow?.workflow?.noiseSuppression?.history?.decayTelemetry?.agedOutByBucket?.sourceRuleHits || 0))}</div></div>${(reviewWorkflow?.workflow?.noiseSuppression?.sourceRules?.activeRules || []).slice(0, 3).map(item => `<div><strong>${esc(item.sourceName || item.sourceId)}</strong><div class="mini">${esc(item.action || 'suppress')} • ${esc(item.reason || 'no reason')}</div></div>`).join('') || '<div class="mini">No active source-specific rules.</div>'}</div>`),
      renderCard('Critical event classifier review', 'Match basis, score margins, and ambiguity flags for retained candidates', `<div class="list"><div><strong>Summary</strong><div class="mini">Active ${esc(String(criticalEventQueue.activeCount || 0))} • monitoring ${esc(String(criticalEventQueue.monitoringCount || 0))} • promoted ${esc(String(criticalEventQueue.promotedCount || 0))} • discarded ${esc(String(criticalEventQueue.discardedCount || 0))}</div></div>${criticalEventCandidateRows(criticalEventQueue.candidates || [])}</div>`),
      renderCard('Runtime action audit timeline', 'Retained queue, completion, and failure history for bounded runtime actions', `<div class="list"><div><strong>Summary</strong><div class="mini">Entries ${esc(String(settings.runtimeControl?.restartAudit?.totalEntries || 0))} • updated ${esc(settings.runtimeControl?.restartAudit?.updatedAt || 'n/a')}</div></div>${restartAuditRows(settings.runtimeControl?.restartAudit?.recentEntries || [])}</div>`),
      renderCard('Workflow audit', 'Recent operator workflow trail', `<div class="list">${(reviewWorkflow?.workflow?.auditTrail || []).map(item => `<div><strong>${esc(item.action || 'action')}</strong><div class="mini">${esc(item.recordedAt || '')} • ${esc(item.status || 'unknown')}</div><div class="mini">${esc(item.sourceId || item.region || item.candidateId || '')}</div></div>`).join('') || '<div>No workflow audit entries yet.</div>'}</div>`),
      renderCard('Diagnostic endpoints', 'Direct inspection links', `<div class="list"><a href="/api/brief/news/review" target="_blank" rel="noreferrer">News review payload</a><a href="/api/brief/news/review/stats" target="_blank" rel="noreferrer">News review stats</a><a href="/api/brief/news/review/acks" target="_blank" rel="noreferrer">Review acknowledgements</a><a href="/api/review-workflow/audit" target="_blank" rel="noreferrer">Review workflow audit</a><a href="/api/settings/admin" target="_blank" rel="noreferrer">Admin settings contract</a><a href="/api/runtime-history/diagnostics" target="_blank" rel="noreferrer">Runtime history diagnostics</a></div>`),
      renderCard('Notes', 'Intent', `<pre>- Diagnostics now exposes direct local-admin review workflow controls with audit capture.\n- Operator settings remains the normal read-only control view.\n- Admin settings remains the broader local-write control plane.</pre>`),
    ].join('');
    restartAuditMonitor.update(latestRestartAudit, { preserveStatus, queuedMessage: 'Runtime action is queued, polling diagnostics…' });
    shell.content.querySelectorAll('button[data-review-action]').forEach(btn => btn.addEventListener('click', async () => {
      const payload = { action: btn.dataset.reviewAction };
      if (btn.dataset.source) payload.sourceId = btn.dataset.source;
      if (btn.dataset.candidate) payload.candidateId = btn.dataset.candidate;
      if (btn.dataset.cluster) payload.clusterId = btn.dataset.cluster;
      if (btn.dataset.targetCluster) payload.targetClusterId = btn.dataset.targetCluster;
      try {
        const concurrency = settings?.persistence?.concurrency || {};
        payload.expectedRevision = concurrency.revision;
        payload.expectedEtag = concurrency.etag;
        const res = await fetch('/api/review-workflow/action', { method: 'POST', headers: { 'Content-Type': 'application/json', 'If-Match': concurrency.etag || '' }, body: JSON.stringify(payload) });
        if (!res.ok) { let body = null; try { body = await res.json(); } catch {} throw new Error(body?.detail || body?.error || `HTTP ${res.status}`); }
        shell.status.textContent = `Applied ${payload.action}. Reloading diagnostics.`;
        boot();
      } catch (err) {
        shell.status.textContent = `Workflow action failed: ${err.message}`;
      }
    }));
  } catch (err) {
    restartAuditMonitor.clear();
    shell.status.textContent = `Failed to load diagnostics: ${err.message}`;
  }
}
boot();
}
</script>
</body>
</html>
