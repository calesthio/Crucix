<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIX Admin Settings</title>
<style>
:root{--bg:#020408;--panel:rgba(6,14,22,.92);--border:rgba(100,240,200,.18);--text:#e8f4f0;--dim:#7b9a92;--accent:#64f0c8;--accent2:#44ccff;--warn:#ffb84c;--mono:ui-monospace,SFMono-Regular,Menlo,monospace;--sans:Inter,system-ui,sans-serif}
*{box-sizing:border-box} html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans)}
body{padding:18px} a{color:var(--accent2)}
.wrap{max-width:1180px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;padding:16px 18px;border:1px solid var(--border);background:var(--panel)}
.kicker,.pill,.mini{font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}.kicker{font-size:11px;color:var(--accent2)} h1{margin:6px 0 4px;font-size:28px} .sub{color:var(--dim);max-width:780px;line-height:1.45}
.pill{display:inline-flex;gap:6px;align-items:center;padding:6px 10px;border:1px solid var(--border);font-size:11px;color:var(--dim);background:transparent;text-decoration:none} .pill strong{color:var(--text)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.card{padding:14px 16px;border:1px solid var(--border);background:var(--panel)} .card h2{margin:0 0 10px;font-size:16px}.mini{font-size:10px;color:var(--dim)}
.row{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-top:1px solid rgba(255,255,255,.05)}.row:first-child{border-top:0;padding-top:0}.key{color:var(--dim)}.val{text-align:right}
.tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.tag{padding:4px 7px;border:1px solid rgba(100,240,200,.18);font-family:var(--mono);font-size:10px;color:var(--accent);background:rgba(100,240,200,.05)}
.note{padding:12px 14px;border:1px solid rgba(255,184,76,.22);background:rgba(255,184,76,.08);color:#ffe3bd;line-height:1.45}
pre{margin:0;white-space:pre-wrap;word-break:break-word;font:12px/1.5 var(--mono);color:#cfe5de}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <div class="kicker">Crucix admin settings</div>
      <h1>Local control plane</h1>
      <div class="sub">This surface is for local-only admin writes, export/import, and other debug-adjacent control-plane actions. It is intentionally separated from the read-only operator view.</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
      <a class="pill" href="/settings">Operator view</a>
      <a class="pill" href="/diagnostics">Diagnostics</a>
      <a class="pill" href="/">Dashboard</a>
      <button class="pill" id="saveBtn" type="button" style="cursor:pointer">Save</button>
      <button class="pill" id="exportBtn" type="button" style="cursor:pointer">Export</button>
      <button class="pill" id="restartBtn" type="button" style="cursor:pointer">Restart</button>
      <button class="pill" id="stopBtn" type="button" style="cursor:pointer">Stop</button>
      <a class="pill" href="/api/settings/admin" target="_blank" rel="noreferrer">Raw Admin JSON</a>
    </div>
  </div>
  <div id="status" class="note">Loading admin settings…</div>
  <div id="grid" class="grid" hidden></div>
</div>
<script>
function esc(value){return String(value ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function row(key, value){return `<div class="row"><div class="key">${esc(key)}</div><div class="val">${value}</div></div>`;}
function tags(items){return `<div class="tags">${items.map(item => `<span class="tag">${esc(item)}</span>`).join('')}</div>`;}
function renderCard(title, subtitle, body){return `<section class="card"><div class="mini">${esc(subtitle)}</div><h2>${esc(title)}</h2>${body}</section>`;}
function selectRow(label, id, value, options){return `<div class="row"><label class="key" for="${esc(id)}">${esc(label)}</label><div class="val"><select id="${esc(id)}">${options.map(option => `<option value="${esc(option.value)}" ${option.value===value?'selected':''}>${esc(option.label)}</option>`).join('')}</select></div></div>`;}
function checkboxGroup(title, name, items, selectedValues){const selected=new Set(selectedValues||[]);return `<div class="row"><div class="key">${esc(title)}</div><div class="val"><div class="tags">${items.map(item => `<label class="tag"><input type="checkbox" name="${esc(name)}" value="${esc(item.value)}" ${selected.has(item.value)?'checked':''}> ${esc(item.label)}</label>`).join('')}</div></div></div>`;}
async function savePreferences(){
  const payload = {
    preferences: {
      layout: {
        visualsMode: document.getElementById('visualsMode')?.value || 'full',
        mapMode: document.getElementById('mapMode')?.value || 'auto',
        displayMode: document.getElementById('displayMode')?.value || 'auto',
        defaultRegion: document.getElementById('defaultRegion')?.value || 'world',
        activeLayer: document.getElementById('activeLayer')?.value || null,
        panels: window.__CRUCIX_PANEL_PREFS__ || {},
      },
      sources: {
        enabledCategories: Array.from(document.querySelectorAll('input[name="enabledCategories"]:checked')).map(el => el.value),
        enabledSourceIds: Array.from(document.querySelectorAll('input[name="enabledSourceIds"]:checked')).map(el => el.value),
      },
      llm: {
        newsModeDefault: document.getElementById('newsModeDefault')?.value || 'auto',
      },
      agentAnalysis: {
        detailLevel: document.getElementById('analysisDetailLevel')?.value || 'standard',
      },
    },
  };
  const res = await fetch('/api/settings/operator', { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
async function exportPreferences(){
  const res = await fetch('/api/settings/export');
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  const blob = new Blob([JSON.stringify(data, null, 2)], { type:'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'crucix-operator-settings.json';
  a.click();
  URL.revokeObjectURL(url);
}
async function runtimeControl(action){
  const res = await fetch('/api/runtime/control', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action }) });
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
async function boot(){
  const status = document.getElementById('status');
  const grid = document.getElementById('grid');
  try {
    const res = await fetch('/api/settings/admin');
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    status.textContent = `Loaded ${data.version} at ${new Date(data.generatedAt).toLocaleString()}`;
    const categories = (data.sources?.categories || []).map(item => `${item.category}: ${item.count}`);
    const lifecycle = (data.sources?.lifecycleStates || []).map(item => `${item.lifecycle}: ${item.count}`);
    const layouts = (data.layout?.available || []).map(item => `${item.id} (${item.status})`);
    grid.hidden = false;
    grid.innerHTML = [
      renderCard('Access', 'Surface role and boundaries', [
        row('Role', esc(data.access?.role || 'admin')),
        row('Mode', esc(data.access?.mode || 'local-write')),
        row('Local admin required', esc(String(Boolean(data.access?.localAdminRequired)))),
        row('Operator surface', esc(data.access?.operatorSurface || '/settings')),
      ].join('')),
      renderCard('Layout', 'UI posture', [
        row('Current', esc(data.layout?.current || 'unknown')),
        selectRow('Visuals mode', 'visualsMode', data.layout?.controls?.visualsMode || 'full', [{value:'full',label:'FULL'},{value:'lite',label:'LITE'}]),
        selectRow('Map mode', 'mapMode', data.layout?.controls?.mapMode || 'auto', [{value:'auto',label:'AUTO'},{value:'flat',label:'FLAT'},{value:'globe',label:'GLOBE'}]),
        selectRow('Display mode', 'displayMode', data.layout?.controls?.displayMode || 'auto', [{value:'auto',label:'AUTO'},{value:'narrow',label:'NARROW'},{value:'desktop',label:'DESKTOP'},{value:'wallboard',label:'WALLBOARD'}]),
        selectRow('Default region', 'defaultRegion', data.layout?.controls?.defaultRegion || 'world', [{value:'world',label:'WORLD'},{value:'americas',label:'AMERICAS'},{value:'europe',label:'EUROPE'},{value:'middleEast',label:'MIDDLE EAST'},{value:'asiaPacific',label:'ASIA PACIFIC'},{value:'africa',label:'AFRICA'}]),
        selectRow('Active layer', 'activeLayer', data.layout?.controls?.activeLayer || '', [{value:'',label:'ALL'},{value:'air',label:'AIR'},{value:'thermal',label:'THERMAL'},{value:'sdr',label:'SDR'},{value:'maritime',label:'MARITIME'},{value:'nuke',label:'NUKE'},{value:'conflict',label:'CONFLICT'},{value:'health',label:'HEALTH'},{value:'news',label:'NEWS'},{value:'osint',label:'OSINT'},{value:'space',label:'SPACE'}]),
        row('Persistence', esc(data.layout?.controls?.persistence || 'unknown')),
        tags(layouts),
      ].join('')),
      renderCard('Sources', 'Inventory and selection', [
        row('Total', esc(data.sources?.total ?? 0)),
        row('Active', esc(data.sources?.active ?? 0)),
        row('Selection mode', esc(data.sources?.selection?.mode || 'unknown')),
        row('Per-source controls', esc(String(Boolean(data.sources?.selection?.supportsPerSourceControl)))),
        checkboxGroup('Enabled categories', 'enabledCategories', (data.sources?.categories || []).map(item => ({ value: item.category, label: `${item.category}: ${item.count}` })), data.sources?.selection?.enabledCategories || []),
        checkboxGroup('Enabled sources', 'enabledSourceIds', (data.sources?.availableSources || []).map(item => ({ value: item.id, label: `${item.name} [${item.category}/${item.lifecycle}]` })), data.sources?.selection?.enabledSourceIds || []),
        categories.length ? tags(categories) : '',
        lifecycle.length ? tags(lifecycle) : '',
      ].join('')),
      renderCard('LLM', 'Provider and runtime state', [
        row('Provider', esc(data.llm?.provider || 'disabled')),
        row('Model', esc(data.llm?.model || 'none')),
        row('Configured', esc(String(Boolean(data.llm?.configured)))),
        row('State', esc(data.llm?.state?.label || data.llm?.state?.status || 'unknown')),
        selectRow('Default news mode', 'newsModeDefault', data.llm?.defaultMode || 'auto', [{value:'auto',label:'AUTO'},{value:'off',label:'OFF'},{value:'force',label:'FORCE'}]),
      ].join('')),
      renderCard('Agent analysis', 'Published reasoning behavior', [
        row('Status', esc(data.agentAnalysis?.current?.status || 'unavailable')),
        row('Confidence', esc(data.agentAnalysis?.current?.confidenceLabel || 'n/a')),
        row('Source', esc(data.agentAnalysis?.current?.source || 'n/a')),
        row('Refinement', esc(data.agentAnalysis?.current?.refinementState || 'n/a')),
        row('Publish mode', esc(data.agentAnalysis?.controls?.publishMode || 'unknown')),
        selectRow('Detail level', 'analysisDetailLevel', data.agentAnalysis?.controls?.detailLevel || 'standard', [{value:'standard',label:'STANDARD'},{value:'compact',label:'COMPACT'},{value:'expanded',label:'EXPANDED'}]),
      ].join('')),
      renderCard('Admin controls', 'Persistence and boundaries', [
        row('Settings path', esc(data.persistence?.path || 'hidden')),
        row('Export enabled', esc(String(Boolean(data.persistence?.capabilities?.export)))),
        row('Import enabled', esc(String(Boolean(data.persistence?.capabilities?.import)))),
        row('Write API enabled', esc(String(Boolean(data.persistence?.capabilities?.writeApi)))),
        row('Requires local request', esc(String(Boolean(data.admin?.boundaries?.requiresLocalRequest)))),
      ].join('')),
      renderCard('Runtime control', 'Process identity and bounded local actions', [
        row('PID', esc(data.runtimeControl?.process?.pid || 'unknown')),
        row('Port', esc(data.runtimeControl?.process?.port || 'unknown')),
        row('Current phase', esc(data.runtimeControl?.sweep?.currentPhase || 'idle')),
        row('Last success', esc(data.runtimeControl?.lastSuccess?.publishedAt || 'none')),
        row('Last recovery phase', esc(data.runtimeControl?.sweep?.lastRecoveryPhase || 'none')),
        row('Allowed actions', esc((data.runtimeControl?.controls?.allowedActions || []).join(', '))),
      ].join('')),
      renderCard('Operator notes', 'Boundaries and honesty', `<pre>${esc((data.notes || []).join('\n- ')).replace(/^/, '- ')}</pre>`),
    ].join('');
    document.getElementById('saveBtn')?.addEventListener('click', async () => {
      try {
        await savePreferences();
        status.textContent = `Saved admin settings at ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        status.textContent = `Failed to save settings: ${err.message}`;
      }
    });
    document.getElementById('exportBtn')?.addEventListener('click', async () => {
      try {
        await exportPreferences();
        status.textContent = `Exported settings at ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        status.textContent = `Failed to export settings: ${err.message}`;
      }
    });
    document.getElementById('restartBtn')?.addEventListener('click', async () => {
      try {
        await runtimeControl('restart-safe');
        status.textContent = 'Queued safe runtime restart.';
      } catch (err) {
        status.textContent = `Failed to queue restart: ${err.message}`;
      }
    });
    document.getElementById('stopBtn')?.addEventListener('click', async () => {
      try {
        await runtimeControl('stop');
        status.textContent = 'Queued local runtime stop.';
      } catch (err) {
        status.textContent = `Failed to queue stop: ${err.message}`;
      }
    });
  } catch (err) {
    status.textContent = `Failed to load settings: ${err.message}`;
  }
}
boot();
</script>
</body>
</html>
